# ============================================================
#  Pipeline Data — Exécution planifiée (cron)
#  Ingestion + ETL + Dashboard tous les jours à 6h UTC
# ============================================================
name: Pipeline Data — Scheduled

on:
  schedule:
    # Tous les jours à 6h00 UTC (7h00 heure Paris)
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max_records:
        description: "Nombre max d'enregistrements à ingérer"
        required: false
        default: "500"

jobs:
  run-pipeline:
    name: Exécuter le pipeline complet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Étape 1/3 — Ingestion
        run: python scripts/ingest.py
        env:
          PYTHONPATH: ${{ github.workspace }}
          METEO_FRANCE_API_KEY: ${{ secrets.METEO_FRANCE_API_KEY }}
          RTE_API_KEY: ${{ secrets.RTE_API_KEY }}

      - name: Étape 2/3 — ETL
        run: python scripts/run_etl.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Étape 3/3 — Dashboard
        run: python scripts/run_dashboard.py
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Sauvegarder les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-output-${{ github.run_number }}
          path: |
            data/warehouse/
            output/dashboards/
            logs/
          retention-days: 30

      - name: Résumé du pipeline
        run: |
          echo "## Pipeline Data — Résumé" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Run** : #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Fichiers générés" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find data/warehouse -type f -name "*.csv" | head -10 >> $GITHUB_STEP_SUMMARY
          find output/dashboards -type f -name "*.html" | head -5 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
