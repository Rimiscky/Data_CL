# ============================================================
#  CI — Tests unitaires + Lint
#  Déclenché sur chaque push et pull request
# ============================================================
name: CI — Tests & Qualité

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Tests unitaires ────────────────────────────────────
  tests:
    name: Tests Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lancer les tests
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=reports/test-results.xml
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Publier les résultats de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: reports/test-results.xml

  # ── Lint (Flake8) ──────────────────────────────────────
  lint:
    name: Lint (Flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer flake8
        run: pip install flake8

      - name: Lancer flake8
        run: |
          flake8 src/ scripts/ --max-line-length=120 --statistics \
            --count --show-source \
            --exclude=__pycache__,*.pyc

  # ── Tests Docker ───────────────────────────────────────
  docker-tests:
    name: Tests dans Docker
    runs-on: ubuntu-latest
    needs: [tests, lint]

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build image de test
        run: docker build --target test -t pipeline-test .

      - name: Exécuter les tests dans Docker
        run: docker run --rm pipeline-test python -m pytest tests/ -v --tb=short
