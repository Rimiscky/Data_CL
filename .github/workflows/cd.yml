# ============================================================
#  CD — Build & Push Docker Image
#  Déclenché sur merge dans main (après CI réussi)
# ============================================================
name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build et Push de l'image Docker ────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement sur EC2 ────────────────────────────────
  deploy-ec2:
    name: Deploy sur AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Déployer sur EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull de la dernière image
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # Arrêter l'ancien conteneur
            docker stop energy-pipeline || true
            docker rm energy-pipeline || true

            # Lancer le nouveau conteneur
            docker run -d \
              --name energy-pipeline \
              --restart unless-stopped \
              -v /home/${{ secrets.EC2_USER }}/data:/app/data \
              -v /home/${{ secrets.EC2_USER }}/logs:/app/logs \
              -v /home/${{ secrets.EC2_USER }}/output:/app/output \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
              python scripts/run_full_pipeline.py

            echo "Déploiement terminé !"
