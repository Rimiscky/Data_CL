# ============================================================
#  CD — Build & Push Docker Image
#  Déclenché sur merge dans main (après CI réussi)
# ============================================================
name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rimiscky/data_cl

jobs:
  # ── Build et Push de l'image Docker ────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build et Push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement sur EC2 ────────────────────────────────
  deploy-ec2:
    name: Deploy sur AWS EC2
    runs-on: self-hosted
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Déployer sur EC2
        run: |
          echo "=== Déploiement sur EC2 ==="
          echo "Host: $(hostname)"
          echo "User: $(whoami)"

          # Pull de la dernière image
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

          # Arrêter l'ancien conteneur
          docker stop energy-pipeline || true
          docker rm energy-pipeline || true

          # Lancer le nouveau conteneur
          docker run -d \
            --name energy-pipeline \
            --restart unless-stopped \

            -e RTE_API_KEY=${{ secrets.RTE_API_KEY }} \
            -e AIRFLOW_SMTP_PASSWORD=${{ secrets.AIRFLOW_SMTP_PASSWORD }} \
            -v /home/ubuntu/data:/app/data \
            -v /home/ubuntu/logs:/app/logs \
            -v /home/ubuntu/output:/app/output \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            python scripts/run_full_pipeline.py

          echo "=== Déploiement terminé ==="

      - name: Relancer le serveur HTTP
        run: |
          pkill -f "http.server 8080" 2>/dev/null || true
          sleep 1
          mkdir -p /home/ubuntu/www/dashboards
          cd /home/ubuntu/www
          nohup python3 -m http.server 8080 > /tmp/server.log 2>&1 &
          echo "Serveur HTTP démarré sur le port 8080"
