# ============================================================
#  CD — Build & Deploy directement sur EC2
#  Déclenché sur merge dans main (après CI réussi)
# ============================================================
name: CD — Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  deploy-ec2:
    name: Build & Deploy sur AWS EC2
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Build de l'image Docker
        run: |
          docker build --target production -t energy-pipeline:latest .

      - name: Déployer le conteneur
        run: |
          echo "=== Déploiement sur EC2 ==="
          docker stop energy-pipeline || true
          docker rm energy-pipeline || true

          docker run -d \
            --name energy-pipeline \
            --restart unless-stopped \
            -e RTE_API_KEY=${{ secrets.RTE_API_KEY }} \
            -e AIRFLOW_SMTP_PASSWORD=${{ secrets.AIRFLOW_SMTP_PASSWORD }} \
            -v /home/ubuntu/data:/app/data \
            -v /home/ubuntu/logs:/app/logs \
            -v /home/ubuntu/output:/app/output \
            energy-pipeline:latest \
            python scripts/run_full_pipeline.py

          echo "=== Déploiement terminé ==="

      - name: Relancer le serveur HTTP
        run: |
          pkill -f "http.server 8080" 2>/dev/null || true
          sleep 1
          mkdir -p /home/ubuntu/output/dashboards
          cd /home/ubuntu/output/dashboards
          nohup python3 -m http.server 8080 > /tmp/server.log 2>&1 &
          echo "Serveur HTTP démarré sur le port 8080"
