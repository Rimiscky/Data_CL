# ============================================================
#  Prometheus — Monitoring du pipeline data
# ============================================================
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus lui-même
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Airflow (métriques StatsD exposées)
  - job_name: "airflow"
    static_configs:
      - targets: ["airflow-webserver:8080"]
    metrics_path: /health

  # PostgreSQL (via pg_exporter si ajouté)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # MinIO
  - job_name: "minio"
    static_configs:
      - targets: ["minio:9000"]
    metrics_path: /minio/v2/metrics/cluster
