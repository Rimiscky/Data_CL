services:

########################
# POSTGRES (Data Warehouse)
########################
  postgres:
    image: pgvector/pgvector:pg13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

########################
# MINIO (Data Lake)
########################
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

########################
# AIRFLOW INIT
########################
  airflow-init:
    image: apache/airflow:2.7.3
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    command: >
      bash -c "airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname admin
      --lastname admin
      --role Admin
      --email admin@example.com"

########################
# AIRFLOW WEBSERVER
########################
  airflow-webserver:
    image: apache/airflow:2.7.3
    container_name: airflow-webserver
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    ports:
      - "8080:8080"
    command: webserver

########################
# AIRFLOW SCHEDULER
########################
  airflow-scheduler:
    image: apache/airflow:2.7.3
    container_name: airflow-scheduler
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
    command: scheduler

########################
# N8N (Orchestration / Automation)
########################
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Paris
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=airflow
      - DB_POSTGRESDB_USER=airflow
      - DB_POSTGRESDB_PASSWORD=airflow
    depends_on:
      - postgres
    volumes:
      - n8n_data:/home/node/.n8n

########################
# PROMETHEUS
########################
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

########################
# GRAFANA
########################
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

########################
# PIPELINE DATA (Tests)
########################
  pipeline-tests:
    build:
      context: .
      target: test
    container_name: energy-pipeline-tests
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

########################
# PIPELINE DATA (Ingestion)
########################
  pipeline-ingestion:
    build:
      context: .
      target: production
    container_name: energy-pipeline-ingestion
    command: ["python", "scripts/ingest.py"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (ETL)
########################
  pipeline-etl:
    build:
      context: .
      target: production
    container_name: energy-pipeline-etl
    command: ["python", "scripts/run_etl.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (Full: Ingestion → ETL)
########################
  pipeline-full:
    build:
      context: .
      target: production
    container_name: energy-pipeline-full
    command: ["python", "scripts/run_full_pipeline.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (Dashboard)
########################
  pipeline-dashboard:
    build:
      context: .
      target: production
    container_name: energy-pipeline-dashboard
    command: ["python", "scripts/run_dashboard.py"]
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./logs:/app/logs
    restart: "no"

########################
# VOLUMES
########################
volumes:
  postgres_data:
  grafana_data:
  n8n_data:
  minio_data: