services:
########################
# POSTGRES (Data Warehouse)
########################
  postgres:
    image: pgvector/pgvector:pg13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

########################
# MINIO (Data Lake S3)
########################
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 3

  # Création automatique des buckets MinIO au démarrage
  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 admin password;
      mc mb --ignore-existing local/raw-energy;
      mc mb --ignore-existing local/raw-scraping;
      mc mb --ignore-existing local/raw-meteo;
      mc mb --ignore-existing local/warehouse;
      mc mb --ignore-existing local/governance;
      echo 'Buckets MinIO créés';
      "
    restart: "no"

########################
# AIRFLOW INIT
########################
  airflow-init:
    image: apache/airflow:2.7.3
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
    command: >
      bash -c "airflow db init &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname Pipeline
      --role Admin
      --email admin@energy-pipeline.local"

########################
# AIRFLOW WEBSERVER
########################
  airflow-webserver:
    image: apache/airflow:2.7.3
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/energy_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./output:/opt/airflow/output
      - ./logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      retries: 5

########################
# AIRFLOW SCHEDULER
########################
  airflow-scheduler:
    image: apache/airflow:2.7.3
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/energy_db
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./config:/opt/airflow/config
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./output:/opt/airflow/output
      - ./logs:/opt/airflow/logs
    command: scheduler

########################
# N8N (Automation)
########################
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - GENERIC_TIMEZONE=Europe/Paris
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_DATABASE=airflow
      - DB_POSTGRESDB_USER=airflow
      - DB_POSTGRESDB_PASSWORD=airflow
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n

########################
# PROMETHEUS (Monitoring)
########################
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

########################
# GRAFANA (Dashboards)
########################
  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      postgres:
        condition: service_healthy

########################
# POSTGRES EXPORTER (pour Prometheus)
########################
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://airflow:airflow@postgres:5432/energy_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

########################
# PIPELINE DATA (Tests)
########################
  pipeline-tests:
    build:
      context: .
      target: test
    container_name: energy-pipeline-tests
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]

########################
# PIPELINE DATA (Ingestion)
########################
  pipeline-ingestion:
    build:
      context: .
      target: production
    container_name: energy-pipeline-ingestion
    command: ["python", "scripts/ingest.py"]
    volumes:
      - ./data/raw:/app/data/raw
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (ETL)
########################
  pipeline-etl:
    build:
      context: .
      target: production
    container_name: energy-pipeline-etl
    command: ["python", "scripts/run_etl.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (Full: Ingestion → ETL)
########################
  pipeline-full:
    build:
      context: .
      target: production
    container_name: energy-pipeline-full
    command: ["python", "scripts/run_full_pipeline.py"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE DATA (Dashboard)
########################
  pipeline-dashboard:
    build:
      context: .
      target: production
    container_name: energy-pipeline-dashboard
    command: ["python", "scripts/run_dashboard.py"]
    volumes:
      - ./data:/app/data:ro
      - ./output:/app/output
      - ./logs:/app/logs
    restart: "no"

########################
# PIPELINE — Chargement DB
########################
  pipeline-load-db:
    build:
      context: .
      target: production
    container_name: energy-pipeline-load-db
    command: ["python", "scripts/load_to_db.py"]
    environment:
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/energy_db
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pipeline-governance:
    build:
      context: .
      target: production
    container_name: energy-pipeline-governance
    command: ["python", "scripts/run_governance.py"]
    environment:
      DATABASE_URL: postgresql://airflow:airflow@postgres:5432/energy_db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

########################
# VOLUMES
########################
volumes:
  postgres_data:
  grafana_data:
  n8n_data:
  minio_data:
  prometheus_data:
